name: Build

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Verify
        run: mvn --batch-mode --no-transfer-progress verify

      - name: Verify shaded Bytedeco metadata
        shell: bash
        run: |
          jar tf target/LuigiScreen-*.jar > target/jar-entries.txt
          grep -Fx 'META-INF/maven/org.bytedeco/ffmpeg/pom.properties' target/jar-entries.txt
          grep -Fx 'META-INF/maven/org.bytedeco/javacpp/pom.properties' target/jar-entries.txt
