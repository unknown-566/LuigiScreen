mediamtx:
  generated: "<green>Nastavení MediaMTX pro situaci <situation> bylo vytvořeno.</green>"
  folder: "<gray>Složka: <folder></gray>"
  obs-server: "<aqua>Server pro OBS: <url></aqua>"
  obs-options: "<gray>Klíč streamu: nechat prázdný | Použít ověření: vypnuto</gray>"
  decoder-switching: "<yellow>RTMP dekodér se bezpečně přepíná na pozadí.</yellow>"
  private-warning: "<yellow>Soubor setup.txt uchovávej v soukromí. Obsahuje vygenerované přihlašovací údaje.</yellow>"
  failed: "<red>Nastavení MediaMTX se nezdařilo. Podívej se do konzole serveru.</red>"
  private-answer: "<dark_gray>Tvoje další zpráva v chatu je soukromá pro průvodce. Slovem cancel ho ukončíš.</dark_gray>"
  choose: "<yellow>Vyber situaci MediaMTX:</yellow>"
  option-same-pc: "<white>/screen mediamtx same-pc - vše běží na jednom počítači</white>"
  option-lan: "<white>/screen mediamtx lan - OBS je na jiném počítači ve stejné síti</white>"
  option-internet: "<white>/screen mediamtx internet - OBS se připojuje přes veřejnou IP a port forwarding</white>"
  option-vpn: "<white>/screen mediamtx vpn - CGNAT, Tailscale nebo ZeroTier</white>"
  option-hosting: "<white>/screen mediamtx hosting - MediaMTX běží na jiném serveru</white>"
  invalid-host: "<red>Zadej platnou IPv4 adresu nebo hostname. Slovem cancel průvodce ukončíš.</red>"
  invalid-public-host: "<red>Zadej veřejnou IPv4 adresu nebo DNS hostname. Slovem cancel průvodce ukončíš.</red>"
  invalid-vpn-host: "<red>Zadej platnou VPN IP adresu nebo hostname. Slovem cancel průvodce ukončíš.</red>"
  invalid-hosting-host: "<red>Zadej IPv4 adresu nebo DNS hostname serveru MediaMTX. Slovem cancel průvodce ukončíš.</red>"
  invalid-port: "<red>Zadej TCP port od 1 do 65535 nebo napiš default. Slovem cancel průvodce ukončíš.</red>"
  cancelled: "<yellow>Průvodce MediaMTX byl zrušen.</yellow>"
  timeout: "<yellow>Čas průvodce MediaMTX vypršel. Spusť příkaz znovu.</yellow>"
  prompt-lan: "<gold>Zadej LAN IPv4 adresu počítače s MediaMTX:</gold>"
  prompt-lan-multiple: "<gold>Bylo nalezeno více LAN adres: <addresses>. Zadej správnou:</gold>"
  prompt-public-host: "<gold>Zadej svou veřejnou IPv4 adresu nebo DNS hostname:</gold>"
  prompt-public-port: "<gold>Zadej veřejný TCP port přesměrovaný na místní port <port> nebo napiš default:</gold>"
  prompt-vpn-host: "<gold>Zadej VPN/Tailscale/ZeroTier IP nebo hostname, který používá počítač s OBS:</gold>"
  prompt-hosting-host: "<gold>Zadej veřejnou IP nebo DNS hostname externího serveru MediaMTX:</gold>"
  prompt-hosting-port: "<gold>Zadej externí RTMP port MediaMTX nebo napiš default:</gold>"
  setup-header: |-
    Nastavení LuigiScreen MediaMTX
    ==============================

    Situace: <situation>

    1. Umísti mediamtx.yml vedle mediamtx.exe.
    2. Restartuj MediaMTX.
    3. MediaMTX musí oznámit RTMP listener na portu <port>.

    OBS:
      Služba: Vlastní
      Server: <obs_url>
      Klíč streamu: nechat prázdný
      Použít ověření: vypnuto

    LuigiScreen:
      Globální výchozí URL a plátna používající předchozí výchozí URL
      se automaticky nastaví na: <plugin_url>

  setup-same-pc: |-
    OBS, MediaMTX a Minecraft server běží na stejném počítači.
    Obvykle není potřeba měnit router ani firewall.
  setup-lan: |-
    Ve firewallu počítače s MediaMTX povol příchozí TCP port <port>.
    Port forwarding na routeru není potřeba.
  setup-internet: |-
    Pravidlo routeru:
      Veřejný TCP <public_port> -> <lan_host> TCP <local_port>

    Pro počítač s MediaMTX nastav stálou LAN adresu a ve firewallu povol
    příchozí TCP port <local_port>.
  setup-vpn: |-
    OBS musí být připojené ke stejné síti VPN/Tailscale/ZeroTier.
    Pokud firewall spojení blokuje, povol na VPN rozhraní TCP port <port>.
  setup-hosting: |-
    Tento mediamtx.yml patří na externí počítač s MediaMTX.
    Otevři na něm TCP port <port>. LuigiScreen používá oddělený účet pouze pro čtení.
  setup-security: |-
    Zabezpečení:
      Tento soubor uchovávej v soukromí. Obsahuje vygenerované přihlašovací údaje.
      RTSP, HLS, WebRTC, SRT a MoQ jsou vypnuté.

