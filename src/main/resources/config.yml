language: cs

web-studio:
  # LAN-ready by default. /screen web creates a one-time login link and still protects access.
  enabled: true
  bind: "0.0.0.0"
  port: 8765
  # Set this when Studio is exposed through a reverse proxy, for example:
  # public-url: "https://studio.example.com"
  public-url: ""
  server-name: "LuigiScreen Server"
  session-hours: 8
  login-token-minutes: 5
  live-update-millis: 1000
  # Generated only while at least one authenticated Web Studio session exists.
  preview-refresh-millis: 1000
  preview-max-width: 640

updates:
  # Checks the public Modrinth project without blocking the server thread.
  enabled: true
  project: luigiscreen
  modrinth-url: "https://modrinth.com/plugin/luigiscreen"
  check-interval-hours: 6
  timeout-seconds: 10
  notify-console: true
  notify-players: true
  # A missing/unpublished project returns 404 and is always ignored quietly.
  log-failures: false

stream:
  # Legacy RTMP default kept for MediaMTX compatibility.
  url: "rtmp://127.0.0.1:55556/screen"
  fps: 8
  reconnect-delay-seconds: 3
  reconnect-max-delay-seconds: 30
  # Maximum time FFmpeg may wait for remote network input.
  io-timeout-seconds: 5

source:
  # Default source assigned to newly created screens.
  type: rtmp
  value: "rtmp://127.0.0.1:55556/screen"

sources:
  # Relative video, image and GIF paths are resolved inside this folder.
  media-directory: media
  allow-absolute-paths: false
  http-timeout-seconds: 10
  max-image-bytes: 16777216
  max-image-pixels: 16777216

playback:
  # Number-only durations are treated as seconds. Strings can use ms, s, m or h.
  default-duration: 30s
  tick-seconds: 1

# Optional named rotations. Enable one on a screen with:
# /screen playlist set <screen> <playlist>
playlists:
  example_rotation:
    default-duration: 30s
    # Exclude recent items and categories before the weighted roll.
    history-window: 3
    category-history-window: 1
    items:
      main_stream:
        type: rtmp
        value: "rtmp://127.0.0.1:55556/screen"
        weight: 10
        duration: 60s
        category: live
      random_media:
        type: folder
        folder: trailers
        media-types: [video, image, gif]
        weight: 3
        duration: 20s
        cooldown: 2m
        category: trailer
        # If not selected for this long, it wins the next eligible roll.
        guaranteed-after: 30m
        conditions:
          min-viewers: 1

# Optional manual event scenes. Play one with:
# /screen event play <screen> <event>
events:
  example_announcement:
    priority: 50
    sequence:
      title:
        type: text
        text: "Announcement starts soon"
        duration: 5s
      trailer:
        type: video
        value: "trailers/announcement.mp4"
        duration: 25s
      operator:
        type: wait-manual
        text: "Waiting for operator"
        duration: 1s

screen:
  # Defaults used by newly created screens and by the legacy config migration.
  auto-start: true
  viewer-distance: 64
  glowing-frames: false
  dithering: false
  max-width: 10
  max-height: 6
  max-total-maps: 60
  configured: false
  world: ""
  corner-a: ""
  corner-b: ""
  facing: "NORTH"

# Every screen stores its own typed source and rendering settings here.
# Screens with the same source type and value automatically share one loader.
# Example generated entry:
# screens:
#   main:
#     source:
#       type: rtmp
#       value: "rtmp://127.0.0.1:55556/screen"
#     fps: 8.0
#     distance: 64.0
#     world: world
#     location: "0,80,0"
#     width: 7
#     height: 4
#     facing: NORTH
#     enabled: true
#     permission-required: false
screens: {}

migration:
  single-screen-completed: false

performance:
  # Reduces FPS automatically on very large screens.
  adaptive-fps: true
  max-map-updates-per-second: 400
  minimum-fps: 0.2
  # Avoids video scaling and map conversion when nobody is near the screen.
  pause-rendering-without-viewers: true
  # Delta frames need an additional full-size memory buffer.
  delta-updates-max-maps: 256
  # Must be longer than stream.io-timeout-seconds for safe decoder shutdown.
  worker-stop-timeout-seconds: 8

logging:
  # FFmpeg uses a process-wide log level shared with other JavaCV plugins.
  # Available values: quiet, error, warning, info, debug
  ffmpeg-level: quiet

debug:
  # The boss bar is updated on the main thread. 10 ticks equals 0.5 seconds.
  bossbar-update-ticks: 10
  # Also show a personal 15-line statistics sidebar while debug is enabled.
  sidebar-enabled: true
  # Each statistics page stays visible for this many seconds.
  page-duration-seconds: 2
