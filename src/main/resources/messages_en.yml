  saved-screen-too-large: "Saved screen exceeds the configured size limits. Adjust screen limits or create it again."
  render-failed: "MapEngine render failed: <error>"
  decoder-stop-failed: "RTMP decoder did not stop safely. The screen was kept alive."
  stream-connected: "Connected to RTMP stream: <url> (<width>x<height>)"
  mediamtx-failed: "MediaMTX setup failed: <error>"
