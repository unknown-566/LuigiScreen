mediamtx:
  generated: "<green>MediaMTX setup generated for <situation>.</green>"
  folder: "<gray>Folder: <folder></gray>"
  obs-server: "<aqua>OBS server: <url></aqua>"
  obs-options: "<gray>Stream key: leave empty | Use authentication: disabled</gray>"
  decoder-switching: "<yellow>The RTMP decoder is switching safely in the background.</yellow>"
  private-warning: "<yellow>Keep setup.txt private. It contains generated credentials.</yellow>"
  failed: "<red>MediaMTX setup failed. Check the server console.</red>"
  private-answer: "<dark_gray>Your next chat message is private to the setup wizard. Type cancel to stop.</dark_gray>"
  choose: "<yellow>Choose a MediaMTX situation:</yellow>"
  option-same-pc: "<white>/screen mediamtx same-pc - everything runs on one computer</white>"
  option-lan: "<white>/screen mediamtx lan - OBS is on another computer in the same network</white>"
  option-internet: "<white>/screen mediamtx internet - OBS connects through public IP and port forwarding</white>"
  option-vpn: "<white>/screen mediamtx vpn - CGNAT, Tailscale or ZeroTier</white>"
  option-hosting: "<white>/screen mediamtx hosting - MediaMTX runs on another server</white>"
  invalid-host: "<red>Enter a valid IPv4 address or hostname. Type cancel to stop.</red>"
  invalid-public-host: "<red>Enter your public IPv4 address or DNS hostname. Type cancel to stop.</red>"
  invalid-vpn-host: "<red>Enter a valid VPN IP address or hostname. Type cancel to stop.</red>"
  invalid-hosting-host: "<red>Enter the MediaMTX IPv4 address or DNS hostname. Type cancel to stop.</red>"
  invalid-port: "<red>Enter a TCP port from 1 to 65535, or type default. Type cancel to stop.</red>"
  cancelled: "<yellow>MediaMTX setup cancelled.</yellow>"
  timeout: "<yellow>MediaMTX setup timed out. Run the command again.</yellow>"
  prompt-lan: "<gold>Enter the LAN IPv4 address of the MediaMTX computer:</gold>"
  prompt-lan-multiple: "<gold>Multiple LAN addresses were found: <addresses>. Enter the correct one:</gold>"
  prompt-public-host: "<gold>Enter your public IPv4 address or DNS hostname:</gold>"
  prompt-public-port: "<gold>Enter the public TCP port forwarded to local port <port> (or type default):</gold>"
  prompt-vpn-host: "<gold>Enter the VPN/Tailscale/ZeroTier IP or hostname used by the OBS computer:</gold>"
  prompt-hosting-host: "<gold>Enter the public IP or DNS hostname of the external MediaMTX server:</gold>"
  prompt-hosting-port: "<gold>Enter the external MediaMTX RTMP port (or type default):</gold>"
  setup-header: |-
    LuigiScreen MediaMTX setup
    ==========================

    Situation: <situation>

    1. Put mediamtx.yml next to mediamtx.exe.
    2. Restart MediaMTX.
    3. MediaMTX must report an RTMP listener on port <port>.

    OBS:
      Service: Custom
      Server: <obs_url>
      Stream key: leave empty
      Use authentication: disabled

    LuigiScreen config.yml:
      stream:
        url: "<plugin_url>"

  setup-same-pc: |-
    OBS, MediaMTX and the Minecraft server run on the same computer.
    No router or firewall change is normally required.
  setup-lan: |-
    Allow inbound TCP <port> in the MediaMTX computer firewall.
    No router port forwarding is required.
  setup-internet: |-
    Router rule:
      Public TCP <public_port> -> <lan_host> TCP <local_port>

    Keep the MediaMTX computer LAN address reserved/static and allow inbound
    TCP <local_port> in its firewall.
  setup-vpn: |-
    OBS must be connected to the same VPN/Tailscale/ZeroTier network.
    Allow inbound TCP <port> on the VPN interface if the firewall blocks it.
  setup-hosting: |-
    This mediamtx.yml belongs on the external MediaMTX machine.
    Open TCP <port> there. LuigiScreen has been configured with a separate
    read-only account.
  setup-security: |-
    Security:
      Keep this file private. It contains generated stream credentials.
      RTSP, HLS, WebRTC, SRT and MoQ are disabled.

