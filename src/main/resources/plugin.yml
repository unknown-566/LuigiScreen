name: LuigiScreen
version: '${project.version}'
main: cz.luigismp.screen.LuigiScreenPlugin
api-version: '1.21.11'
depend: [MapEngine]
authors: [unknown_56]
description: A server-side Paper/Bukkit plugin for live media map screens.

commands:
  luigiscreen:
    description: Manage LuigiScreen media screens and Control Studio.
    aliases: [screen]
    usage: /screen <menu|create|clone|list|start|stop|remove|status|source|playlist|event|vote|set|reload|debug|mediamtx>

permissions:
  luigiscreen.admin:
    description: Grants every LuigiScreen command and access to protected screens.
    default: op
    children:
      luigiscreen.create: true
      luigiscreen.clone: true
      luigiscreen.list: true
      luigiscreen.start: true
      luigiscreen.stop: true
      luigiscreen.remove: true
      luigiscreen.status: true
      luigiscreen.source: true
      luigiscreen.playlist: true
      luigiscreen.event: true
      luigiscreen.set: true
      luigiscreen.reload: true
      luigiscreen.debug: true
      luigiscreen.mediamtx: true
      luigiscreen.update: true
      luigiscreen.vote: true
      luigiscreen.menu.*: true
      luigiscreen.see.*: true
  luigiscreen.create:
    description: Allows creating screens.
    default: false
  luigiscreen.clone:
    description: Allows cloning screens.
    default: false
  luigiscreen.list:
    description: Allows listing configured screens.
    default: false
  luigiscreen.start:
    description: Allows enabling screens.
    default: false
  luigiscreen.stop:
    description: Allows disabling screens.
    default: false
  luigiscreen.remove:
    description: Allows removing screens.
    default: false
  luigiscreen.status:
    description: Allows viewing screen and stream status.
    default: false
  luigiscreen.source:
    description: Allows viewing and changing screen media sources.
    default: false
  luigiscreen.playlist:
    description: Allows assigning and clearing screen playlists.
    default: false
  luigiscreen.event:
    description: Allows playing and stopping screen events.
    default: false
  luigiscreen.set:
    description: Allows changing per-screen settings.
    default: false
  luigiscreen.reload:
    description: Allows reloading LuigiScreen.
    default: false
  luigiscreen.debug:
    description: Allows viewing LuigiScreen debug statistics.
    default: false
  luigiscreen.mediamtx:
    description: Allows generating MediaMTX configurations and credentials.
    default: false
  luigiscreen.update:
    description: Receives notifications when a newer LuigiScreen version is available.
    default: op
  luigiscreen.menu.*:
    description: Grants access to every LuigiScreen Control Studio section.
    default: false
    children:
      luigiscreen.menu.dashboard: true
      luigiscreen.menu.screens: true
      luigiscreen.menu.media: true
      luigiscreen.menu.playlists: true
      luigiscreen.menu.events: true
      luigiscreen.menu.live: true
      luigiscreen.menu.groups: true
      luigiscreen.menu.schedules: true
      luigiscreen.menu.templates: true
      luigiscreen.menu.diagnostics: true
      luigiscreen.menu.history: true
      luigiscreen.menu.emergency: true
      luigiscreen.menu.control: true
  luigiscreen.menu.dashboard:
    description: Opens LuigiScreen Control Studio.
    default: op
  luigiscreen.menu.screens:
    description: Views screens and their details in Control Studio.
    default: false
  luigiscreen.menu.media:
    description: Views and cues Media Library sources.
    default: false
  luigiscreen.menu.playlists:
    description: Views, simulates and assigns playlists.
    default: false
  luigiscreen.menu.events:
    description: Views and starts event timelines.
    default: false
  luigiscreen.menu.live:
    description: Uses Live Control Room.
    default: false
  luigiscreen.menu.groups:
    description: Controls screen groups.
    default: false
  luigiscreen.menu.schedules:
    description: Views the schedule calendar.
    default: false
  luigiscreen.menu.templates:
    description: Installs starter templates.
    default: false
  luigiscreen.menu.diagnostics:
    description: Views screen diagnostics.
    default: false
  luigiscreen.menu.history:
    description: Views the studio audit history.
    default: false
  luigiscreen.menu.emergency:
    description: Enables or disables global emergency mode.
    default: false
  luigiscreen.menu.control:
    description: Changes playback and screen state from menus.
    default: false
  luigiscreen.vote:
    description: Allows a player to vote in active LuigiScreen media votes.
    default: true
  luigiscreen.see.*:
    description: Allows viewing every permission-protected screen.
    default: false
