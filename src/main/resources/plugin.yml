name: LuigiScreen
version: '${project.version}'
main: cz.luigismp.screen.LuigiScreenPlugin
api-version: '1.21.11'
depend: [MapEngine]
authors: [LuigiSMP]
description: A server-side Paper/Bukkit plugin for live RTMP map screens.

commands:
  luigiscreen:
    description: Manage the LuigiSMP live screen.
    aliases: [screen]
    usage: /screen <create|start|stop|remove|status|reload|debug|mediamtx>
    permission: luigiscreen.admin

permissions:
  luigiscreen.admin:
    description: Allows management of the live screen.
    default: op
